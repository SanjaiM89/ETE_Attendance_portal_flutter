name: Cross-Platform Builds (Windows, macOS, iOS, Android, Linux)

on:
  push:
    branches: [ "master", "main", "flutter" ]
    tags:
      - 'v*' # Trigger release on version tags like v1.0.0
  pull_request:
    branches: [ "master", "main", "flutter" ]
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build All Platforms
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # We group target platforms by their required runner OS
        include:
          - os: windows-latest
            target: windows
            artifact_name_frontend: ETE-Windows
            artifact_path_frontend: ./FrontEnd/build/windows/x64/runner/Release
            artifact_name_admin: ETE_ADMIN-Windows
            artifact_path_admin: ./admin_frontend/build/windows/x64/runner/Release

          - os: macos-latest
            target: macos
            artifact_name_frontend: ETE-macOS
            artifact_path_frontend: ./FrontEnd/build/macos/Build/Products/Release/frontend.app
            artifact_name_admin: ETE_ADMIN-macOS
            artifact_path_admin: ./admin_frontend/build/macos/Build/Products/Release/frontend.app

          - os: macos-latest
            target: ios
            artifact_name_frontend: ETE-iOS
            artifact_path_frontend: ./FrontEnd/build/ios/iphoneos/
            artifact_name_admin: ETE_ADMIN-iOS
            artifact_path_admin: ./admin_frontend/build/ios/iphoneos/

          - os: ubuntu-latest
            target: android
            artifact_name_frontend: ETE-APK
            artifact_path_frontend: ./FrontEnd/build/app/outputs/flutter-apk/
            artifact_name_admin: ETE_ADMIN-APK
            artifact_path_admin: ./admin_frontend/build/app/outputs/flutter-apk/

          - os: ubuntu-latest
            target: linux
            artifact_name_frontend: ETE-Linux-AppImage
            artifact_path_frontend: ./ETE-x86_64.AppImage
            artifact_name_admin: ETE_ADMIN-Linux-AppImage
            artifact_path_admin: ./ETE_ADMIN-x86_64.AppImage

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (for Android)
        if: matrix.target == 'android'
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies (for Linux/AppImage)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Enable Desktop Configurations
        if: matrix.target != 'android' && matrix.target != 'ios'
        run: |
          flutter config --enable-windows-desktop
          flutter config --enable-macos-desktop
          flutter config --enable-linux-desktop

      # ── FrontEnd (ETE) ──────────────────────────────────────────────
      - name: Build FrontEnd (${{ matrix.target }})
        working-directory: ./FrontEnd
        run: |
          flutter create --platforms=${{ matrix.target }} .
          # Create all platform dirs so flutter_launcher_icons can generate all icons
          flutter create --platforms=android . 2>/dev/null || true
          if [ "${{ runner.os }}" == "macOS" ]; then
            flutter create --platforms=ios . 2>/dev/null || true
            sed -i '' 's/ios: false/ios: true/' pubspec.yaml
          fi
          flutter pub get
          dart run flutter_launcher_icons
          if [ "${{ matrix.target }}" == "android" ]; then
            sed -i 's/android:label="[^"]*"/android:label="ETE"/' android/app/src/main/AndroidManifest.xml
            flutter build apk --split-per-abi --release
          elif [ "${{ matrix.target }}" == "ios" ]; then
            flutter build ios --release --no-codesign
          else
            flutter build ${{ matrix.target }} --release
          fi
        shell: bash

      - name: Construct FrontEnd AppImage
        if: matrix.target == 'linux'
        run: |
          APP_DIR="ETE.AppDir"
          mkdir -p "$APP_DIR/usr/bin"
          mkdir -p "$APP_DIR/usr/share/applications"
          mkdir -p "$APP_DIR/usr/share/icons/hicolor/256x256/apps"
          cp -r ./FrontEnd/build/linux/x64/release/bundle/* "$APP_DIR/usr/bin/"
          cat > "$APP_DIR/AppRun" <<EOF
          #!/bin/sh
          HERE="\$(dirname "\$(readlink -f "\${0}")")"
          export LD_LIBRARY_PATH="\${HERE}/usr/bin/lib:\$LD_LIBRARY_PATH"
          exec "\${HERE}/usr/bin/frontend" "\$@"
          EOF
          chmod +x "$APP_DIR/AppRun"
          cat > "$APP_DIR/ETE.desktop" <<EOF
          [Desktop Entry]
          Name=ETE
          Exec=frontend
          Icon=ETE
          Type=Application
          Categories=Utility;
          EOF
          cp ./logo.png "$APP_DIR/ETE.png"
          ln -sf "ETE.png" "$APP_DIR/.DirIcon"
          ./appimagetool-x86_64.AppImage "$APP_DIR" "./ETE-x86_64.AppImage" || ./appimagetool-x86_64.AppImage --appimage-extract-and-run "$APP_DIR" "./ETE-x86_64.AppImage"

      - name: Upload FrontEnd Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name_frontend }}
          path: ${{ matrix.artifact_path_frontend }}

      # ── Admin FrontEnd (ETE_ADMIN) ──────────────────────────────────
      - name: Build Admin FrontEnd (${{ matrix.target }})
        working-directory: ./admin_frontend
        run: |
          flutter create --platforms=${{ matrix.target }} .
          # Create all platform dirs so flutter_launcher_icons can generate all icons
          flutter create --platforms=android . 2>/dev/null || true
          if [ "${{ runner.os }}" == "macOS" ]; then
            flutter create --platforms=ios . 2>/dev/null || true
            sed -i '' 's/ios: false/ios: true/' pubspec.yaml
          fi
          flutter pub get
          dart run flutter_launcher_icons
          if [ "${{ matrix.target }}" == "android" ]; then
            sed -i 's/android:label="[^"]*"/android:label="ETE_ADMIN"/' android/app/src/main/AndroidManifest.xml
            flutter build apk --split-per-abi --release
          elif [ "${{ matrix.target }}" == "ios" ]; then
            flutter build ios --release --no-codesign
          else
            flutter build ${{ matrix.target }} --release
          fi
        shell: bash

      - name: Construct Admin FrontEnd AppImage
        if: matrix.target == 'linux'
        run: |
          APP_DIR="ETE_ADMIN.AppDir"
          mkdir -p "$APP_DIR/usr/bin"
          mkdir -p "$APP_DIR/usr/share/applications"
          mkdir -p "$APP_DIR/usr/share/icons/hicolor/256x256/apps"
          cp -r ./admin_frontend/build/linux/x64/release/bundle/* "$APP_DIR/usr/bin/"
          cat > "$APP_DIR/AppRun" <<EOF
          #!/bin/sh
          HERE="\$(dirname "\$(readlink -f "\${0}")")"
          export LD_LIBRARY_PATH="\${HERE}/usr/bin/lib:\$LD_LIBRARY_PATH"
          exec "\${HERE}/usr/bin/frontend" "\$@"
          EOF
          chmod +x "$APP_DIR/AppRun"
          cat > "$APP_DIR/ETE_ADMIN.desktop" <<EOF
          [Desktop Entry]
          Name=ETE_ADMIN
          Exec=frontend
          Icon=ETE_ADMIN
          Type=Application
          Categories=Utility;
          EOF
          cp ./logo.png "$APP_DIR/ETE_ADMIN.png"
          ln -sf "ETE_ADMIN.png" "$APP_DIR/.DirIcon"
          ./appimagetool-x86_64.AppImage "$APP_DIR" "./ETE_ADMIN-x86_64.AppImage" || ./appimagetool-x86_64.AppImage --appimage-extract-and-run "$APP_DIR" "./ETE_ADMIN-x86_64.AppImage"

      - name: Upload Admin FrontEnd Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name_admin }}
          path: ${{ matrix.artifact_path_admin }}

  release:
    name: Publish to GitHub Releases
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' # Publish on push (or manual)
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release_assets
          # Windows Flutter apps require the whole Release directory to run, so they must be zipped
          if [ -d "artifacts/ETE-Windows" ]; then zip -r release_assets/ETE-Windows.zip artifacts/ETE-Windows/*; fi
          if [ -d "artifacts/ETE_ADMIN-Windows" ]; then zip -r release_assets/ETE_ADMIN-Windows.zip artifacts/ETE_ADMIN-Windows/*; fi
          
          # macOS and iOS apps are directories (.app bundles) and must be zipped
          # macOS
          if [ -d "artifacts/ETE-macOS" ]; then
            APP_PATH=$(find artifacts/ETE-macOS -maxdepth 1 -name "*.app" | head -n 1)
            if [ -n "$APP_PATH" ]; then mv "$APP_PATH" release_assets/ETE.app; cd release_assets; zip -r ETE-macOS.zip ETE.app; rm -rf ETE.app; cd ..; fi
          fi
          if [ -d "artifacts/ETE_ADMIN-macOS" ]; then
            APP_PATH=$(find artifacts/ETE_ADMIN-macOS -maxdepth 1 -name "*.app" | head -n 1)
            if [ -n "$APP_PATH" ]; then mv "$APP_PATH" release_assets/ETE_ADMIN.app; cd release_assets; zip -r ETE_ADMIN-macOS.zip ETE_ADMIN.app; rm -rf ETE_ADMIN.app; cd ..; fi
          fi
          
          # iOS
          if [ -d "artifacts/ETE-iOS" ]; then
            APP_PATH=$(find artifacts/ETE-iOS -name "*.app" | head -n 1)
            if [ -n "$APP_PATH" ]; then mv "$APP_PATH" release_assets/ETE-iOS.app; cd release_assets; zip -r ETE-iOS.zip ETE-iOS.app; rm -rf ETE-iOS.app; cd ..; else zip -r release_assets/ETE-iOS.zip artifacts/ETE-iOS/*; fi
          fi
          if [ -d "artifacts/ETE_ADMIN-iOS" ]; then
            APP_PATH=$(find artifacts/ETE_ADMIN-iOS -name "*.app" | head -n 1)
            if [ -n "$APP_PATH" ]; then mv "$APP_PATH" release_assets/ETE_ADMIN-iOS.app; cd release_assets; zip -r ETE_ADMIN-iOS.zip ETE_ADMIN-iOS.app; rm -rf ETE_ADMIN-iOS.app; cd ..; else zip -r release_assets/ETE_ADMIN-iOS.zip artifacts/ETE_ADMIN-iOS/*; fi
          fi
          
          # Android APKs: Since there are multiple APKs per app (split by ABI), we loop and copy them with a clear prefix
          if ls artifacts/ETE-APK/*.apk 1> /dev/null 2>&1; then for file in artifacts/ETE-APK/*.apk; do cp "$file" "release_assets/ETE-$(basename "$file")"; done; fi
          if ls artifacts/ETE_ADMIN-APK/*.apk 1> /dev/null 2>&1; then for file in artifacts/ETE_ADMIN-APK/*.apk; do cp "$file" "release_assets/ETE_ADMIN-$(basename "$file")"; done; fi

          # Linux AppImages: explicitly rename and move them
          if ls artifacts/ETE-Linux-AppImage/*.AppImage 1> /dev/null 2>&1; then cp artifacts/ETE-Linux-AppImage/*.AppImage release_assets/ETE-Linux.AppImage; fi
          if ls artifacts/ETE_ADMIN-Linux-AppImage/*.AppImage 1> /dev/null 2>&1; then cp artifacts/ETE_ADMIN-Linux-AppImage/*.AppImage release_assets/ETE_ADMIN-Linux.AppImage; fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "latest-build-${{ github.run_number }}"
          name: "Development Build #${{ github.run_number }}"
          draft: false
          prerelease: true
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
